name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.25.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build package dependency artifacts
        run: pnpm --filter @patchbayhq/ui build

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run package tests
        run: pnpm run test

      - name: Check types
        run: pnpm run check-types

      - name: Run browser tests
        run: pnpm run test:browser

      - name: Build
        run: pnpm run build

  deploy-docs:
    name: Deploy docs Worker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.25.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check Cloudflare deploy secrets
        id: cloudflare-secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -n "$CLOUDFLARE_API_TOKEN" ] && [ -n "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build docs Worker assets
        if: steps.cloudflare-secrets.outputs.configured == 'true'
        run: pnpm run build:docs

      - name: Prepare docs Worker CI config
        if: steps.cloudflare-secrets.outputs.configured == 'true'
        working-directory: apps/docs-worker
        run: |
          node --input-type=module <<'EOF'
          import { readFileSync, writeFileSync } from "node:fs";

          const config = JSON.parse(readFileSync("wrangler.jsonc", "utf8"));
          delete config.routes;
          writeFileSync("wrangler.ci.jsonc", `${JSON.stringify(config, null, 2)}\n`);
          EOF

      - name: Deploy docs Worker
        if: steps.cloudflare-secrets.outputs.configured == 'true'
        working-directory: apps/docs-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm exec wrangler deploy --config wrangler.ci.jsonc

      - name: Skip docs Worker deploy
        if: steps.cloudflare-secrets.outputs.configured != 'true'
        run: echo "Cloudflare deploy skipped because CLOUDFLARE_API_TOKEN or CLOUDFLARE_ACCOUNT_ID is not configured."
